name: Build, Test, and Release

permissions:
  contents: write # Required for creating releases and uploading assets

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*' # Trigger on version tags like v0.1.0
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Job 1: Runs on every push/PR to ensure code quality
  build_and_test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libleptonica-dev libtesseract-dev clang pkg-config

      - name: Build
        run: cargo build --verbose

      - name: Check cargo formatting
        run: cargo fmt -- --check

      - name: Run tests
        run: cargo test --verbose

  # Job 2: Creates the release on GitHub. Only runs on new tags.
  create_release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build_and_test
    if: startsWith(github.ref, 'refs/tags/v')
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false

  # Job 3: Builds binaries for multiple platforms and uploads them. Only runs on new tags.
  build_and_upload_assets:
    name: Build & Upload Release Assets
    needs: create_release
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest      # ARM runner — cross-compile for Intel via Rosetta
          - target: aarch64-apple-darwin
            os: macos-latest      # ARM (Apple Silicon) runner
          # - target: x86_64-pc-windows-msvc
          #   os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Ubuntu x86_64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y libleptonica-dev libtesseract-dev clang pkg-config

      - name: Install system dependencies (macOS ARM – native)
        if: matrix.target == 'aarch64-apple-darwin'
        run: brew install tesseract leptonica pkg-config

      - name: Install system dependencies (macOS x86_64 – cross-compile via Rosetta)
        if: matrix.target == 'x86_64-apple-darwin'
        run: |
          # Install an x86_64 copy of Homebrew under /usr/local
          arch -x86_64 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          arch -x86_64 /usr/local/bin/brew install tesseract leptonica pkg-config

      # - name: Install system dependencies (Windows via vcpkg)
      #   if: matrix.os == 'windows-latest'
      #   shell: pwsh
      #   run: |
      #     git clone https://github.com/microsoft/vcpkg $env:RUNNER_TEMP/vcpkg
      #     & "$env:RUNNER_TEMP/vcpkg/bootstrap-vcpkg.bat"
      #
      #     # Install native x64 deps for MSVC build
      #     & "$env:RUNNER_TEMP/vcpkg/vcpkg.exe" install leptonica:x64-windows tesseract:x64-windows
      #
      #     "VCPKG_ROOT=$env:RUNNER_TEMP/vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      #     "VCPKGRS_DYNAMIC=1" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build binary
        env:
          PKG_CONFIG_ALLOW_CROSS: "1"
          PKG_CONFIG_PATH: ${{ matrix.target == 'x86_64-apple-darwin' && '/usr/local/lib/pkgconfig' || '' }}
          # VCPKG_ROOT: ${{ env.VCPKG_ROOT }}
          # VCPKGRS_DYNAMIC: ${{ env.VCPKGRS_DYNAMIC }}
        run: cargo build --verbose --release --target ${{ matrix.target }}

      - name: Package binary for release
        shell: bash
        run: |
          # The binary will be in the release directory
          cd target/${{ matrix.target }}/release
          
          # Rename the binary to include the target triple
          # if [ "${{ matrix.os }}" = "windows-latest" ]; then
          #   mv shotext.exe shotext-${{ matrix.target }}.exe
          #   echo "ASSET_NAME=shotext-${{ matrix.target }}.exe" >> $GITHUB_ENV
          # else
          mv shotext shotext-${{ matrix.target }}
          echo "ASSET_NAME=shotext-${{ matrix.target }}" >> $GITHUB_ENV
          # fi

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create_release.outputs.upload_url }}
          asset_path: ./target/${{ matrix.target }}/release/${{ env.ASSET_NAME }}
          asset_name: ${{ env.ASSET_NAME }}
          asset_content_type: application/octet-stream

  # Job 4: Publishes to crates.io. Only runs on new tags.
  publish_to_crates:
    name: Publish to crates.io
    needs: build_and_test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install system dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libleptonica-dev libtesseract-dev clang pkg-config

      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CRATES_TOKEN }}